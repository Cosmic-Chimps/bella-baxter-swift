name: Publish Swift SDK (SPM)

# Swift Package Manager uses git tags — no central registry.
# Consumers add this repo as a Swift package dependency:
#   .package(url: "https://github.com/cosmic-chimps/bella-baxter-swift", from: "X.Y.Z")
#
# This workflow verifies the VERSION file, builds the package, and creates a GitHub Release.
# Triggered by release-sdk.yml creating a tag on this repo.

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish bella-baxter-swift
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing bella-baxter-swift $VERSION"

      - name: Verify VERSION file matches tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          FILE_VERSION=$(cat VERSION 2>/dev/null || echo "")
          if [ "$FILE_VERSION" != "$VERSION" ]; then
            echo "::error::VERSION file has '$FILE_VERSION' but tag is '$VERSION' — run release-sdk.yml first"
            exit 1
          fi
          echo "✓ VERSION file $FILE_VERSION matches tag $VERSION"

      - name: Build Swift package
        run: swift build -c release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Swift SDK ${{ github.ref_name }}"
          generate_release_notes: true

  notify:
    runs-on: ubuntu-latest
    needs: publish
    if: always()
    steps:
      - uses: slackapi/slack-github-action@v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: |
            text: "${{ needs.publish.result == 'success' && '✅' || needs.publish.result == 'failure' && '❌' || '⚠️' }} *SDK Swift publish ${{ github.ref_name }}*: ${{ needs.publish.result }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
